<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESS Calculation</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f5f7fa;padding:30px 15px;max-width:1000px;margin:0 auto}
        .title{text-align:center;margin-bottom:16px;color:#222}
        /* 语言切换栏 */
        .lang-bar{text-align:center;margin-bottom:20px}
        .lang-btn{padding:6px 12px;margin:0 4px;border:none;border-radius:4px;cursor:pointer;background:#357abd;color:#fff}
        .lang-btn.active{background:#265d8f}
        .box{background:#fff;border-radius:10px;padding:24px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:20px}
        .box h3{margin-bottom:16px;color:#333}
        
        /* 电器表格 */
        table{width:100%;border-collapse:collapse;margin:12px 0}
        th,td{border:1px solid #dee2e6;padding:10px;text-align:center}
        th{background:#357abd;color:#fff}
        .name-input{width:140px}
        .num-input{width:70px}
        
        /* 按钮 */
        .btn{padding:8px 14px;background:#357abd;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-right:8px}
        .btn.del{background:#e74c3c}
        .btn-bar{margin:10px 0}
        
        /* 总计 */
        .total{font-size:20px;font-weight:bold;color:#c0392b;text-align:center;margin:20px 0}
        
        /* 配置结果 */
        .result{background:#eef5ff;padding:20px;border-radius:8px}
        .result p{margin:6px 0;font-size:16px}
    </style>
</head>
<body>

<h1 class="title" id="page-title">RESS Calculation</h1>

<!-- 语言切换按钮 -->
<div class="lang-bar">
    <button class="lang-btn active" onclick="switchLang('en')">English</button>
    <button class="lang-btn" onclick="switchLang('vi')">Tiếng Việt</button>
    <button class="lang-btn" onclick="switchLang('th')">ภาษาไทย</button>
</div>

<!-- 电器清单 -->
<div class="box">
    <h3 id="app-title">Appliance List</h3>
    <div class="btn-bar">
        <button class="btn" id="add-btn" onclick="addRow()">+ Add Appliance</button>
        <button class="btn del" id="del-btn" onclick="delRow()">- Delete Selected</button>
    </div>
    <table>
        <thead>
            <tr>
                <th id="th-select">Select</th>
                <th id="th-app">Appliance</th>
                <th id="th-qty">Qty</th>
                <th id="th-power">Power(W)</th>
                <th id="th-hour">Hour/Day</th>
                <th id="th-unit">Unit(kWh)</th>
                <th id="th-total">Total(kWh)</th>
            </tr>
        </thead>
        <tbody id="appTable">
        </tbody>
    </table>

    <div class="total" id="total-label">Total Consumption: <span id="total">0</span> kWh/day</div>

    <div class="result">
        <h3 id="sys-title">System Recommendation</h3>
        <p id="p1">Daily Consumption: <span id="d1">0</span> kWh</p>
        <p id="p2">Solar Panel: <span id="d2">0</span> KWp</p>
        <p id="p3">Battery Capacity: <span id="d3">0</span> KWh (51.2V)</p>
        <p id="p4">Inverter: <span id="d4">0</span> KVA Pure Sine Wave</p>
    </div>
</div>

<script>
// 多语言配置（英文/越南语/泰语）
const lang = {
    en: {
        title: "RESS Calculation",
        appList: "Appliance List",
        add: "+ Add Appliance",
        del: "- Delete Selected",
        select: "Select",
        appliance: "Appliance",
        qty: "Qty",
        power: "Power(W)",
        hour: "Hour/Day",
        unit: "Unit(kWh)",
        totalCol: "Total(kWh)",
        totalConsumption: "Total Consumption: {val} kWh/day",
        system: "System Recommendation",
        daily: "Daily Consumption: {val} kWh",
        solar: "Solar Panel: {val} KWp",
        battery: "Battery Capacity: {val} KWh (51.2V)",
        inverter: "Inverter: {val} KVA Pure Sine Wave"
    },
    vi: {
        title: "Tính Toán RESS",
        appList: "Danh Sách Thiết Bị",
        add: "+ Thêm Thiết Bị",
        del: "- Xóa Đã Chọn",
        select: "Chọn",
        appliance: "Thiết Bị",
        qty: "Số Lượng",
        power: "Công Suất(W)",
        hour: "Giờ/Ngày",
        unit: "Đơn Vị(kWh)",
        totalCol: "Tổng(kWh)",
        totalConsumption: "Tổng Tiêu Thụ: {val} kWh/ngày",
        system: "Đề Xuất Hệ Thống",
        daily: "Tiêu Thụ Hàng Ngày: {val} kWh",
        solar: "Tấm Năng Lượng Mặt Trời: {val} KWp",
        battery: "Dung Lượng Pin: {val} KWh (51.2V)",
        inverter: "Bộ Đảo Ngược: {val} KVA Sóng Sin Thuần"
    },
    th: {
        title: "การคำนวณ RESS",
        appList: "รายการอุปกรณ์",
        add: "+ เพิ่มอุปกรณ์",
        del: "- ลบรายการที่เลือก",
        select: "เลือก",
        appliance: "อุปกรณ์",
        qty: "จำนวน",
        power: "กำลัง(W)",
        hour: "ชั่วโมง/วัน",
        unit: "หน่วย(kWh)",
        totalCol: "รวม(kWh)",
        totalConsumption: "การใช้พลังงานรวม: {val} kWh/วัน",
        system: "คำแนะนำระบบ",
        daily: "การใช้ประจำวัน: {val} kWh",
        solar: "แผงโซล่าเซลล์: {val} KWp",
        battery: "ความจุแบตเตอรี่: {val} KWh (51.2V)",
        inverter: "อินเวอร์เตอร์: {val} KVA คลื่นไซน์บริสุทธิ์"
    }
};

// 当前默认语言
let currentLang = 'en';

// 切换语言函数
function switchLang(l) {
    currentLang = l;
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.lang-btn[onclick="switchLang('${l}')"]`).classList.add('active');
    
    // 更新所有文本
    document.getElementById('page-title').innerText = lang[l].title;
    document.getElementById('app-title').innerText = lang[l].appList;
    document.getElementById('add-btn').innerText = lang[l].add;
    document.getElementById('del-btn').innerText = lang[l].del;
    
    document.getElementById('th-select').innerText = lang[l].select;
    document.getElementById('th-app').innerText = lang[l].appliance;
    document.getElementById('th-qty').innerText = lang[l].qty;
    document.getElementById('th-power').innerText = lang[l].power;
    document.getElementById('th-hour').innerText = lang[l].hour;
    document.getElementById('th-unit').innerText = lang[l].unit;
    document.getElementById('th-total').innerText = lang[l].totalCol;
    
    document.getElementById('sys-title').innerText = lang[l].system;
    
    // 重新计算并更新带数值的文本
    calc();
}

// 初始化默认行
window.onload = function(){
    addRowDefault("Air Conditioner 1.0HP",1,750,8);
    addRowDefault("Fan",4,35,12);
    addRowDefault("Refrigerator",1,120,24);
    addRowDefault("LED Light",6,18,6);
    addRowDefault("TV",1,100,6);
    addRowDefault("Water Pump",1,550,2);
    addRowDefault("Rice Cooker",1,700,2);
    addRowDefault("Router",1,12,24);
    switchLang('en');
}

// 添加默认行
function addRowDefault(name,qty,power,hour){
    const tb = document.getElementById("appTable");
    const tr = document.createElement("tr");
    tr.innerHTML = `
    <td><input type="checkbox" class="chk"></td>
    <td><input class="name-input" type="text" value="${name}" oninput="calc()"></td>
    <td><input class="num-input" type="number" value="${qty}" oninput="calc()"></td>
    <td><input class="num-input" type="number" value="${power}" oninput="calc()"></td>
    <td><input class="num-input" type="number" value="${hour}" oninput="calc()"></td>
    <td><span class="unit">0</span></td>
    <td><span class="sum">0</span></td>
    `;
    tb.appendChild(tr);
    calc();
}

// 添加空白行
function addRow(){
    const tb = document.getElementById("appTable");
    const tr = document.createElement("tr");
    tr.innerHTML = `
    <td><input type="checkbox" class="chk"></td>
    <td><input class="name-input" type="text" placeholder="Appliance" oninput="calc()"></td>
    <td><input class="num-input" type="number" value="1" oninput="calc()"></td>
    <td><input class="num-input" type="number" value="0" oninput="calc()"></td>
    <td><input class="num-input" type="number" value="0" oninput="calc()"></td>
    <td><span class="unit">0</span></td>
    <td><span class="sum">0</span></td>
    `;
    tb.appendChild(tr);
    calc();
}

// 删除选中行
function delRow(){
    const chks = document.querySelectorAll(".chk:checked");
    chks.forEach(c=>c.parentElement.parentElement.remove());
    calc();
}

// 实时计算 + 多语言数值更新
function calc(){
    const rows = document.querySelectorAll("#appTable tr");
    let total = 0;
    rows.forEach(r=>{
        const qty = Number(r.children[2].children[0].value)||0;
        const pow = Number(r.children[3].children[0].value)||0;
        const hour= Number(r.children[4].children[0].value)||0;
        const unit = (pow*hour/1000).toFixed(2);
        const sum = (unit*qty).toFixed(2);
        r.children[5].innerText = unit;
        r.children[6].innerText = sum;
        total += parseFloat(sum);
    });

    const val = total.toFixed(1);
    // 更新带数值的文本
    document.getElementById('total-label').innerHTML = lang[currentLang].totalConsumption.replace('{val}', `<span id="total">${val}</span>`);
    document.getElementById('p1').innerHTML = lang[currentLang].daily.replace('{val}', `<span id="d1">${val}</span>`);
    document.getElementById('p2').innerHTML = lang[currentLang].solar.replace('{val}', `<span id="d2">${(total/2.92).toFixed(1)}</span>`);
    document.getElementById('p3').innerHTML = lang[currentLang].battery.replace('{val}', `<span id="d3">${(total*2.05).toFixed(1)}</span>`);
    document.getElementById('p4').innerHTML = lang[currentLang].inverter.replace('{val}', `<span id="d4">${(total*0.41).toFixed(1)}</span>`);
}
</script>

</body>
</html>
